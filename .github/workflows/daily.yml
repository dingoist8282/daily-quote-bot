name: 오늘의 명언 발송

on:
  schedule:
    # 매일 22:00 UTC = 한국시간 07:00 KST
    - cron: "0 22 * * *"
  workflow_dispatch:  # 수동 실행 버튼 활성화

jobs:
  send-quote:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # sent_quotes.json 커밋을 위해 필요

    steps:
      - name: 레포지토리 체크아웃
        uses: actions/checkout@v4.2.2

      - name: Python 3.11 설정
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.11"

      - name: 의존 패키지 설치
        run: pip install -r requirements.txt

      - name: 명언 크롤링 및 텔레그램 발송
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
        run: python main.py

      - name: 발송 기록(sent_quotes.json) 커밋
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sent_quotes.json
          # 변경 사항이 있을 때만 커밋
          git diff --cached --quiet || git commit -m "📅 명언 발송 기록 업데이트: $(date +'%Y-%m-%d')"
          git push
